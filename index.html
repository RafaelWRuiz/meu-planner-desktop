<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Weekly Planner Pro — Ultrawide</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --gold: #FFD700;
      --gold-dark: #B8860B;
      --glass: rgba(0, 0, 0, 0.25);
      --border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent !important;
      color: white;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Container posicionado à direita conforme o Lovable */
    .app-container {
      position: fixed;
      right: 40px;
      bottom: 40px;
      width: 1080px;
      height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .title span { color: var(--gold); font-style: italic; }

    .nav-buttons {
      display: flex;
      gap: 12px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 50px;
      border: 1px solid var(--border);
    }

    .nav-buttons button {
      background: transparent;
      border: none;
      color: var(--gold);
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr) 0.9fr;
      gap: 15px;
      flex: 1;
      min-height: 0;
    }

    .day-column {
      background: var(--glass);
      backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .day-header {
      padding: 20px 10px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .day-name { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; opacity: 0.6; text-transform: uppercase; }
    .day-date { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); margin-top: 4px; }

    .day-content {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 10px;
    }

    .day-content::-webkit-scrollbar { display: none; }

    .tasks-section {
      border-bottom: 1px dashed rgba(255,255,255,0.1);
      padding-bottom: 10px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .hour-row {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,0.03);
    }

    .time-label {
      font-size: 9px;
      color: var(--gold);
      font-weight: 700;
      width: 25px;
      opacity: 0.7;
    }

    .event-container { flex: 1; display: flex; flex-direction: column; gap: 4px; }

    .event-card {
      background: rgba(255, 255, 255, 0.05);
      border-left: 3px solid var(--gold);
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      line-height: 1.4;
      animation: fadeIn 0.5s ease forwards;
    }

    .sync-badge {
      position: fixed;
      bottom: 15px;
      right: 50px;
      font-size: 10px;
      color: var(--gold);
      opacity: 0.3;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <h1 class="title">Weekly <span>Planner</span></h1>
      <div class="nav-buttons">
        <button onclick="changeWeek(-1)">Anterior</button>
        <button onclick="resetWeek()">Hoje</button>
        <button onclick="changeWeek(1)">Próxima</button>
      </div>
    </div>

    <div class="grid" id="main-grid">
      </div>
  </div>

  <div class="sync-badge">
    <i data-lucide="refresh-cw" size="12"></i>
    <span id="sync-time">Sincronizando...</span>
  </div>

  <script>
    let weekOffset = 0;

    function getMonday(d) {
      d = new Date(d);
      const day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
      const monday = new Date(d.setDate(diff));
      monday.setHours(0,0,0,0);
      return monday;
    }

    function renderLayout() {
      const grid = document.getElementById('main-grid');
      grid.innerHTML = '';
      
      const startOfWeek = getMonday(new Date());
      startOfWeek.setDate(startOfWeek.getDate() + (weekOffset * 7));

      for (let i = 0; i < 6; i++) {
        const current = new Date(startOfWeek);
        current.setDate(startOfWeek.getDate() + i);
        const dateStr = current.toISOString().split('T')[0].replace(/-/g, '');
        
        const dayNames = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Weekend'];
        const isWeekend = i === 5;

        let hoursHtml = '';
        for (let h = 7; h <= 21; h++) {
          const hh = String(h).padStart(2, '0');
          hoursHtml += `
            <div class="hour-row">
              <div class="time-label">${hh}:00</div>
              <div class="event-container" id="slot-${dateStr}T${hh}"></div>
            </div>`;
        }

        grid.innerHTML += `
          <div class="day-column">
            <div class="day-header">
              <div class="day-name">${isWeekend ? 'FIM DE SEMANA' : dayNames[i]}</div>
              <div class="day-date">${current.getDate()}/${current.getMonth() + 1}</div>
            </div>
            <div class="day-content">
              <div class="tasks-section" id="tasks-${dateStr}"></div>
              ${hoursHtml}
            </div>
          </div>`;
      }
      lucide.createIcons();
      fetchEvents();
    }

    async function fetchEvents() {
      const timeLabel = document.getElementById('sync-time');
      try {
        const response = await fetch('/api/calendar?t=' + Date.now());
        const text = await response.text();
        
        // Limpar eventos antigos
        document.querySelectorAll('.event-container, .tasks-section').forEach(el => el.innerHTML = '');

        const events = text.split("BEGIN:VEVENT");
        events.shift();

        events.forEach(block => {
          const summary = block.match(/SUMMARY:(.*)/)?.[1]?.trim();
          const start = block.match(/DTSTART.*:(\d{8})(T(\d{2}))?/);

          if (summary && start) {
            const d = start[1];
            const h = start[3];

            if (h) {
              const slot = document.getElementById(`slot-${d}T${h}`);
              if (slot) slot.innerHTML += `<div class="event-card">${summary}</div>`;
            } else {
              const taskArea = document.getElementById(`tasks-${d}`);
              if (taskArea) taskArea.innerHTML += `<div class="event-card" style="border-left-color: #fff; opacity: 0.8;">${summary}</div>`;
            }
          }
        });
        timeLabel.innerText = "Atualizado: " + new Date().toLocaleTimeString().slice(0,5);
      } catch (e) {
        timeLabel.innerText = "Erro de conexão";
      }
    }

    function changeWeek(n) { weekOffset += n; renderLayout(); }
    function resetWeek() { weekOffset = 0; renderLayout(); }

    renderLayout();
    setInterval(fetchEvents, 600000);
  </script>
</body>
</html>
