<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Planner Desktop</title>
    <style>
        body {
            margin: 0; padding: 40px; font-family: 'Segoe UI', sans-serif;
            background: transparent; color: white; display: flex;
            justify-content: center; gap: 15px; height: 100vh; overflow: hidden;
        }
        .column {
            width: 210px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px); border-radius: 12px;
            padding: 15px; border: 1px solid rgba(255,255,255,0.1);
            height: fit-content; min-height: 450px;
        }
        .header { border-bottom: 2px solid #ffd700; margin-bottom: 15px; text-align: center; padding-bottom: 8px; }
        .header h2 { margin: 0; font-size: 1rem; color: #ffd700; text-transform: uppercase; }
        .header span { font-size: 0.8rem; opacity: 0.5; }
        .event-box {
            background: rgba(255,255,255,0.07); padding: 10px;
            border-radius: 6px; margin-top: 8px; border-left: 3px solid #ffd700;
            font-size: 0.85rem;
        }
        .time { color: #ffd700; font-weight: bold; font-size: 0.75rem; display: block; }
        #status-display { position: fixed; bottom: 10px; left: 10px; font-size: 11px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div id="status-display">Iniciando sincronização...</div>
    <div id="planner"></div>

    <script>
        const ICS_URL = "https://outlook.live.com/owa/calendar/138c7a3c-953b-481d-ba4e-d23089a28169/1a8f188a-a392-4f70-9058-636fdf58efb3/cid-AABD2FC4AE1F391F/calendar.ics";
        
        // Terceira opção de Proxy (Cloudflare Worker - Mais robusto)
        const PROXY = "https://api.allorigins.win/raw?url=";

        async function carregarAgenda() {
            const status = document.getElementById('status-display');
            try {
                // Adicionamos um timestamp para evitar cache do proxy
                const finalUrl = PROXY + encodeURIComponent(ICS_URL + "?t=" + Date.now());
                const response = await fetch(finalUrl);
                
                if (!response.ok) throw new Error("Servidor respondeu com erro");
                
                const data = await response.text();
                
                if (data.includes("BEGIN:VCALENDAR")) {
                    render(data);
                    status.innerText = "Sincronizado: " + new Date().toLocaleTimeString();
                } else {
                    status.innerText = "Dados recebidos são inválidos.";
                }
            } catch (e) {
                console.error(e);
                status.innerText = "Erro ao conectar. Tentando novamente...";
            }
        }

        function render(data) {
            const weekDates = ["20260420", "20260421", "20260422", "20260423", "20260424"];
            const names = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
            const container = document.getElementById('planner');
            container.innerHTML = '';

            weekDates.forEach((dt, i) => {
                container.innerHTML += `
                    <div class="column">
                        <div class="header"><h2>${names[i]}</h2><span>${dt.slice(6,8)}/${dt.slice(4,6)}</span></div>
                        <div id="events-${dt}"></div>
                    </div>`;
            });

            const events = data.split("BEGIN:VEVENT");
            events.forEach(ev => {
                const title = ev.match(/SUMMARY:(.*)\r?\n/)?.[1];
                const match = ev.match(/:(\d{8})T(\d{4})/);
                if (title && match) {
                    const d = match[1];
                    const h = match[2].slice(0,2);
                    const m = match[2].slice(2,4);
                    const target = document.getElementById(`events-${d}`);
                    if (target) {
                        target.innerHTML += `<div class="event-box"><span class="time">${h}:${m}</span>${title}</div>`;
                    }
                }
            });
        }

        carregarAgenda();
        setInterval(carregarAgenda, 300000); // 5 min
    </script>
</body>
</html>
