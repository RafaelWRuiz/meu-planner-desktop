<script>
        const ICS_URL = "https://outlook.live.com/owa/calendar/138c7a3c-953b-481d-ba4e-d23089a28169/1a8f188a-a392-4f70-9058-636fdf58efb3/cid-AABD2FC4AE1F391F/calendar.ics";
        
        // NOVO PROXY: Mais estável e funciona melhor na Vercel
        const PROXY = "https://corsproxy.io/?";

        async function fetchCalendar() {
            const loader = document.getElementById('loader');
            try {
                // Montamos a URL passando pelo proxy
                const response = await fetch(PROXY + encodeURIComponent(ICS_URL));
                
                if (!response.ok) throw new Error("Erro na rede");
                
                const data = await response.text();
                
                if (data.includes("BEGIN:VCALENDAR")) {
                    render(data);
                    loader.innerText = "Sincronizado: " + new Date().toLocaleTimeString();
                    loader.style.color = "#00ff00";
                } else {
                    loader.innerText = "Dados inválidos recebidos";
                }
            } catch (e) {
                console.error("Erro:", e);
                loader.innerText = "Erro ao conectar. Tentando novamente...";
                loader.style.color = "#ff4444";
            }
        }

        function render(data) {
            const weekDates = ["20260420", "20260421", "20260422", "20260423", "20260424"];
            const names = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];
            const container = document.getElementById('planner');
            container.innerHTML = '';

            weekDates.forEach((dt, i) => {
                container.innerHTML += `
                    <div class="column">
                        <div class="header"><h2>${names[i]}</h2><span>${dt.slice(6,8)}/${dt.slice(4,6)}</span></div>
                        <div id="events-${dt}"></div>
                    </div>`;
            });

            const events = data.split("BEGIN:VEVENT");
            events.forEach(ev => {
                const title = ev.match(/SUMMARY:(.*)\r?\n/)?.[1];
                const match = ev.match(/:(\d{8})T(\d{4})/);
                if (title && match) {
                    const d = match[1];
                    let h = parseInt(match[2].slice(0,2));
                    const m = match[2].slice(2,4);
                    
                    const target = document.getElementById(`events-${d}`);
                    if (target) {
                        target.innerHTML += `<div class="event-box"><span class="time">${h.toString().padStart(2,'0')}:${m}</span>${title}</div>`;
                    }
                }
            });
        }

        fetchCalendar();
        setInterval(fetchCalendar, 300000); // Atualiza a cada 5 minutos
    </script>
