<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Weekly Planner — Wallpaper 2560×1080</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --gold:#FFD700;
    --gold-soft: rgba(255,215,0,0.65);
    --glass-bg: rgba(0,0,0,0.20);
    --glass-border: rgba(255,255,255,0.10);
    --glass-inner: rgba(255,255,255,0.04);
    --text: rgba(255,255,255,0.92);
    --text-dim: rgba(255,255,255,0.55);
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html, body{
    width:100%;
    height:100vh;
    background-color: #000 !important; /* Fundo preto solicitado */
    font-family: "Inter", "Helvetica Neue", system-ui, sans-serif;
    color: var(--text);
    overflow:hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* LAYOUT ULTRAWIDE ORIGINAL DO LOVABLE */
  .planner-app{
    position: fixed;
    right: 45px;
    bottom: 45px;
    width: 1040px;
    height: 78vh;
    display: flex;
    flex-direction: column;
    gap: 18px;
    z-index: 10;
  }

  .header-ui{
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 8px;
  }

  .brand h1{
    font-family: "Playfair Display", serif;
    font-size: 26px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 400;
  }
  .brand h1 span{ color: var(--gold); font-style: italic; }

  .nav-ui{
    display: flex;
    gap: 10px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    padding: 6px 14px;
    border-radius: 30px;
    border: 1px solid var(--glass-border);
  }

  .nav-ui button{
    background: transparent;
    border: none;
    color: var(--gold);
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .planner-grid{
    flex: 1;
    display: grid;
    grid-template-columns: repeat(5, 1fr) 0.92fr;
    gap: 12px;
    min-height: 0;
  }

  .day-col{
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(25px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp 0.6s ease-out forwards;
  }

  .day-head{
    padding: 16px 10px;
    text-align: center;
    border-bottom: 1px solid var(--glass-border);
    background: var(--glass-inner);
  }

  .day-name{ font-size: 9px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-dim); }
  .day-date{ font-size: 18px; color: var(--gold); font-weight: 600; margin-top: 2px; display: block; }

  .day-body{ flex: 1; overflow-y: auto; scrollbar-width: none; padding: 10px; }
  .day-body::-webkit-scrollbar { display: none; }

  .tasks-area{
    min-height: 60px;
    border-bottom: 1px dashed rgba(255,255,255,0.08);
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .hour-row{ display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.03); padding: 6px 0; }
  .hour-label{ width: 28px; font-size: 8px; font-weight: 800; color: var(--gold-soft); text-align: right; }
  .hour-slot{ flex: 1; display: flex; flex-direction: column; gap: 4px; }

  .event-card{
    background: var(--card-bg);
    border-left: 2px solid var(--gold);
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 10px;
    line-height: 1.3;
    animation: fadeIn 0.4s ease forwards;
  }

  #sync-info{ position: fixed; bottom: 15px; right: 45px; font-size: 9px; color: var(--gold); opacity: 0.5; }

  @keyframes slideUp { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeIn { from{opacity:0; transform:scale(0.95);} to{opacity:1; transform:scale(1);} }
</style>
</head>
<body>

<div class="planner-app">
  <div class="header-ui">
    <div class="brand"><h1>Weekly <span>Planner</span></h1></div>
    <div class="nav-ui">
      <button onclick="moveWeek(-1)">←</button>
      <button onclick="goToday()">Hoje</button>
      <button onclick="moveWeek(1)">→</button>
    </div>
  </div>
  <div class="planner-grid" id="main-grid"></div>
</div>

<div id="sync-info">Sincronizando...</div>

<script>
  // CONFIGURAÇÃO DA SUA API NA VERCEL
  const API_ENDPOINT = "/api/calendar";
  const WEEKDAYS = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA"];
  let currentOffset = 0;

  function renderGrid() {
    const grid = document.getElementById("main-grid");
    grid.innerHTML = "";
    
    const today = new Date();
    const monday = new Date(today);
    const dayToSubtract = today.getDay() === 0 ? 6 : today.getDay() - 1;
    monday.setDate(today.getDate() - dayToSubtract + (currentOffset * 7));

    for(let i=0; i<6; i++) {
      const date = new Date(monday);
      date.setDate(monday.getDate() + i);
      const dateId = date.toISOString().split('T')[0].replace(/-/g, '');
      
      let hoursHtml = "";
      for(let h=7; h<=21; h++) {
        const hh = String(h).padStart(2, '0');
        hoursHtml += `
          <div class="hour-row">
            <div class="hour-label">${hh}h</div>
            <div class="hour-slot" id="slot-${dateId}T${hh}"></div>
          </div>`;
      }

      const col = document.createElement("div");
      col.className = "day-col";
      col.style.animationDelay = (i * 0.08) + "s";
      col.innerHTML = `
        <div class="day-head">
          <span class="day-name">${i < 5 ? WEEKDAYS[i] : 'WEEKEND'}</span>
          <span class="day-date">${date.getDate()}/${date.getMonth()+1}</span>
        </div>
        <div class="day-body">
          <div class="tasks-area" id="tasks-${dateId}"></div>
          ${hoursHtml}
        </div>
      `;
      grid.appendChild(col);
    }
    fetchData();
  }

  async function fetchData() {
    const status = document.getElementById("sync-info");
    try {
      const resp = await fetch(API_ENDPOINT + "?v=" + Date.now());
      const ics = await resp.text();
      
      // Limpar campos
      document.querySelectorAll('.hour-slot, .tasks-area').forEach(s => s.innerHTML = "");

      const blocks = ics.split("BEGIN:VEVENT");
      blocks.shift();

      blocks.forEach(b => {
        const summary = b.match(/SUMMARY:(.*)/)?.[1]?.trim();
        const start = b.match(/DTSTART.*:(\d{8})(T(\d{2}))?/);

        if (summary && start) {
          const dId = start[1];
          const hId = start[3];
          if (hId) {
            const slot = document.getElementById(`slot-${dId}T${hId}`);
            if (slot) slot.innerHTML += `<div class="event-card">${summary}</div>`;
          } else {
            const task = document.getElementById(`tasks-${dId}`);
            if (task) task.innerHTML += `<div class="event-card" style="border-left-color: #fff;">${summary}</div>`;
          }
        }
      });
      status.innerText = "SINCRO: " + new Date().toLocaleTimeString().slice(0,5);
    } catch (e) {
      status.innerText = "ERRO DE CONEXÃO";
    }
  }

  function moveWeek(n) { currentOffset += n; renderGrid(); }
  function goToday() { currentOffset = 0; renderGrid(); }

  renderGrid();
  setInterval(fetchData, 600000); // Atualiza a cada 10 min
</script>
</body>
</html>
