<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Weekly Planner — Wallpaper</title>
<meta name="viewport" content="width=2560, initial-scale=1" />
<style>
  :root{
    --gold:#FFD700;
    --gold-soft: rgba(255,215,0,0.65);
    --glass-bg: rgba(0,0,0,0.20);
    --glass-border: rgba(255,255,255,0.10);
    --glass-inner: rgba(255,255,255,0.04);
    --text: rgba(255,255,255,0.92);
    --text-dim: rgba(255,255,255,0.55);
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html, body{
    width:100%;
    height:100vh;
    background: transparent !important; /* Importante para o Lively */
    font-family: "Inter", "Helvetica Neue", system-ui, -apple-system, sans-serif;
    color: var(--text);
    overflow:hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Container principal empurrado para a DIREITA (Ultrawide) */
  .planner{
    position: fixed;
    right: 40px;
    bottom: 40px;
    height: 85vh;
    width: 1050px; /* Largura ideal para 5 dias + fim de semana */
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    padding: 0 10px;
  }
  .header h1{
    font-family: Georgia, serif;
    font-weight: 400;
    font-size: 24px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .header h1 span{ color: var(--gold); font-style: italic; }

  .nav-controls {
    display: flex;
    gap: 10px;
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
  }
  .nav-controls button {
    background: transparent;
    border: none;
    color: var(--gold);
    cursor: pointer;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .grid{
    flex:1;
    display:grid;
    grid-template-columns: repeat(5, 1fr) 0.8fr; /* 5 dias + weekend */
    gap: 12px;
    min-height: 0;
  }

  .day{
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(30px);
    padding: 15px 12px;
    display:flex;
    flex-direction: column;
    overflow:hidden;
  }

  .day-header{ text-align: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 10px;}
  .day-name{ font-size: 9px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-dim); }
  .day-date{ font-size: 16px; color: var(--gold); font-weight: 600; margin-top: 4px; display: block; }

  .tasks-area{ flex: 0 0 25%; border-bottom: 1px dashed rgba(255,255,255,0.1); overflow-y: auto; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; scrollbar-width: none; }
  .hours-area{ flex: 1; overflow-y: auto; scrollbar-width: none; }
  
  .hour-row{ display: flex; align-items: flex-start; min-height: 35px; border-top: 1px solid rgba(255,255,255,0.03); padding: 5px 0; }
  .hour-label{ width: 30px; font-size: 8px; font-weight: bold; color: var(--gold-soft); }
  .hour-slot{ flex: 1; display: flex; flex-direction: column; gap: 3px; }

  .event-card{
    background: var(--card-bg);
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 11px;
    line-height: 1.3;
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn { from{opacity:0; transform: translateY(5px);} to{opacity:1; transform: translateY(0);} }
</style>
</head>
<body>

<div class="planner">
  <div class="header">
    <h1>Weekly <span>Planner</span></h1>
    <div class="nav-controls">
      <button id="btn-prev">←</button>
      <button id="btn-today">HOJE</button>
      <button id="btn-next">→</button>
    </div>
  </div>
  <div class="grid" id="main-grid"></div>
</div>

<script>
  const ICS_URL = "https://outlook.live.com/owa/calendar/138c7a3c-953b-481d-ba4e-d23089a28169/1a8f188a-a392-4f70-9058-636fdf58efb3/cid-AABD2FC4AE1F391F/calendar.ics";
  const PROXY = "https://api.allorigins.win/raw?url=";
  const DIAS_PT = ["SEGUNDA", "TERÇA", "QUARTA", "QUINTA", "SEXTA"];
  let offsetSemanas = 0;

  function criarLayout() {
    const grid = document.getElementById("main-grid");
    grid.innerHTML = "";
    
    const hoje = new Date();
    const segunda = new Date(hoje);
    segunda.setDate(hoje.getDate() - (hoje.getDay() === 0 ? 6 : hoje.getDay() - 1) + (offsetSemanas * 7));

    for(let i=0; i<6; i++) { // 5 dias + 1 coluna extra para weekend
      const d = new Date(segunda);
      d.setDate(segunda.getDate() + i);
      const dataId = d.toISOString().split('T')[0].replace(/-/g, '');
      
      const col = document.createElement("div");
      col.className = "day";
      
      let titulo = i < 5 ? DIAS_PT[i] : "FIM DE SEMANA";
      
      let htmlHoras = "";
      for(let h=7; h<=22; h++) {
        const hh = String(h).padStart(2, '0');
        htmlHoras += `<div class="hour-row"><div class="hour-label">${hh}h</div><div class="hour-slot" id="slot-${dataId}T${hh}"></div></div>`;
      }

      col.innerHTML = `
        <div class="day-header">
          <span class="day-name">${titulo}</span>
          <span class="day-date">${d.getDate()}/${d.getMonth()+1}</span>
        </div>
        <div class="tasks-area" id="tasks-${dataId}"></div>
        <div class="hours-area">${htmlHoras}</div>
      `;
      grid.appendChild(col);
    }
    carregarDados();
  }

  async function carregarDados() {
    try {
      const resp = await fetch(PROXY + encodeURIComponent(ICS_URL + "?t=" + Date.now()));
      const data = await resp.text();
      const blocos = data.split("BEGIN:VEVENT");
      blocos.shift();

      blocos.forEach(b => {
        const title = b.match(/SUMMARY:(.*)/)?.[1]?.trim();
        const start = b.match(/DTSTART.*:(\d{8})(T(\d{2}))?/);
        if(title && start) {
          const dt = start[1];
          const hr = start[3];
          if(hr) {
            const slot = document.getElementById(`slot-${dt}T${hr}`);
            if(slot) slot.innerHTML += `<div class="event-card">${title}</div>`;
          } else {
            const task = document.getElementById(`tasks-${dt}`);
            if(task) task.innerHTML += `<div class="event-card" style="border-left-color: #fff;">${title}</div>`;
          }
        }
      });
    } catch(e) { console.error("Erro na sincronização"); }
  }

  document.getElementById("btn-prev").onclick = () => { offsetSemanas--; criarLayout(); };
  document.getElementById("btn-next").onclick = () => { offsetSemanas++; criarLayout(); };
  document.getElementById("btn-today").onclick = () => { offsetSemanas = 0; criarLayout(); };

  criarLayout();
  setInterval(carregarDados, 600000); // 10 min
</script>
</body>
</html>
